name: sdp-project-ci-cd

on:
  push:
    branches:
      - main
    
jobs:
  deploy-dev:
    name: Deploy to DEV
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to dev
        run: databricks bundle deploy -t dev
    
  run-tests:
    name: Run unit-tests
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pytest pyspark
      - name: Run Tests
        run: pytest databricks/tests/

  deploy-prod:
    name: Deploy to Prod
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}

    runs-on: ubuntu-latest
    environment: prod 
    needs: run-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to prod
        run: databricks bundle deploy -t prod
      
  run-prod-pipeline:
    name: Run Prod ETL Job
    environment: prod
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
    runs-on: ubuntu-latest
    needs: deploy-prod
    steps:
      - name: Debug credentials
        run: |
          echo "Host is: $DATABRICKS_HOST"
          echo "Host length: ${#DATABRICKS_HOST}"

      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Debug Auth
        run: databricks auth describe

      - name: Get Pipeline ID
        run: |
          PIPELINE_ID=$(databricks pipelines list-pipelines --output json | python3 -c "
          import sys, json
          pipelines = json.load(sys.stdin)
          pipeline = next(p for p in pipelines.get('statuses', []) if 'sdp-project-prod' in p.get('name', ''))
          print(pipeline['pipeline_id'])
          ")
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT
        id: get_pipeline

      - name: Debug Pipeline ID
        run: echo "Pipeline ID is ${{ steps.get_pipeline.outputs.pipeline_id }}"

      - name: Run ETL Pipeline
        run: databricks pipelines start-update ${{ secrets.DATABRICKS_PROD_PIPELINE_ID }} --full-refresh
  
